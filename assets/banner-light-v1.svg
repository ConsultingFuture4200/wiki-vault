<svg viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F8F6FF"/>
      <stop offset="100%" stop-color="#F0EAFF"/>
    </linearGradient>
    <linearGradient id="wave1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6D28D9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="wave3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.04"/>
      <stop offset="50%" stop-color="#7C3AED" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6D28D9" stop-opacity="0.03"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7C3AED" stop-opacity="0.4"/>
      <stop offset="80%" stop-color="#4F46E5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)"/>

  <!-- Wave layer 1 — deep, slow curve -->
  <path d="M0,160 C120,120 200,180 320,140 C440,100 560,170 680,130 C740,115 770,125 800,120 L800,200 L0,200 Z" fill="url(#wave1Grad)"/>

  <!-- Wave layer 2 — mid, sharper -->
  <path d="M0,175 C100,155 180,185 280,165 C380,145 480,190 580,160 C660,140 740,170 800,155 L800,200 L0,200 Z" fill="url(#wave2Grad)"/>

  <!-- Wave layer 3 — top shimmer -->
  <path d="M0,185 C80,175 160,195 260,180 C360,165 460,195 560,178 C640,168 720,188 800,175 L800,200 L0,200 Z" fill="url(#wave3Grad)"/>

  <!-- Diagonal divider accent -->
  <line x1="0" y1="200" x2="800" y2="130" stroke="url(#accentLine)" stroke-width="0.5"/>

  <!-- Accent line beneath title -->
  <rect x="260" y="118" width="280" height="1.5" rx="0.75" fill="url(#accentLine)"/>

  <!-- Project name -->
  <text x="400" y="80" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="42" font-weight="700" fill="#1A1035" letter-spacing="-0.5">wiki-vault</text>

  <!-- Tagline -->
  <text x="400" y="108" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#6D28D9" letter-spacing="0.5">Turn raw sources into structured, interlinked Obsidian wikis</text>
</svg>
